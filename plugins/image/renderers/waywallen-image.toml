[renderer]
name = "waywallen-image"
bin = "../../../bin/waywallen-image-renderer"
types = ["image"]
priority = 100
version = "0.1.3"
spawn_version = 4

[renderer.settings]
fps = { type = "u32", default = 30, min = 1, max = 240, step = 1, identity = true, label_key = "settings.image.fps", group = "render", order = 10 }
render_node = { type = "string", default = "", identity = true, label_key = "settings.image.render_node", group = "render", order = 20 }
